<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Agent Huddle - All Notes</title>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script async src="{{{appclient}}}"></script>
    <link rel="stylesheet" type="text/css" href="styles/full_page.css" />
  </head>

  <body>
    <div class="container">
      <div class="header">
        <h1>📌 Agent Huddle - All Ticket Notes</h1>
        <p>View all internal reminders saved across tickets</p>
      </div>

      <div id="loading" class="loading">
        <fw-spinner size="large"></fw-spinner>
        <p>Loading notes...</p>
      </div>

      <div id="empty-state" class="empty-state" style="display: none;">
        <h3>📝 No Notes Found</h3>
        <p>No ticket notes have been saved yet. Use the ticket sidebar to add notes.</p>
      </div>

      <div id="table-container" class="table-wrapper" style="display: none;">
        <table class="notes-table">
          <thead>
            <tr>
              <th>Ticket ID</th>
              <th>Note</th>
              <th>Created</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>

    <fw-modal id="edit-modal" size="standard" title-text="Edit Note" submit-text="Save" cancel-text="Cancel">
      <fw-textarea id="edit-textarea" label="Note Content" placeholder="Enter your note..." rows="6"></fw-textarea>
    </fw-modal>

    <fw-modal id="delete-modal" size="small" title-text="Delete Note" submit-text="Delete" cancel-text="Cancel" submit-color="danger">
      <p>Are you sure you want to delete this note?</p>
    </fw-modal>

    <div id="custom-toast" class="custom-toast">
      <span id="toast-message"></span>
    </div>

    <script type="module" src="https://cdn.jsdelivr.net/npm/@freshworks/crayons@v4/dist/crayons/crayons.esm.js"></script>
    <script nomodule src="https://cdn.jsdelivr.net/npm/@freshworks/crayons@v4/dist/crayons/crayons.js"></script>
    <script defer src="scripts/full_page.js"></script>
  </body>
</html>
