<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Agent Huddle</title>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script async src="{{{appclient}}}"></script>
    <link rel="stylesheet" type="text/css" href="styles/style.css" />
  </head>

  <body>
    <div class="main">
      <fw-label value="Internal Reminders"></fw-label>
      <fw-textarea 
        id="remindersTextarea" 
        placeholder="Enter your internal reminders here..."
        rows="5">
      </fw-textarea>
      <fw-button id="stickButton" color="primary">Stick it!</fw-button>
    </div>

    <script async type="module" src="https://cdn.jsdelivr.net/npm/@freshworks/crayons@v4/dist/crayons/crayons.esm.js"></script>
    <script async nomodule src="https://cdn.jsdelivr.net/npm/@freshworks/crayons@v4/dist/crayons/crayons.js"></script>
    <script defer src="scripts/app.js"></script>
  </body>
</html>
