<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test App</title>
  <style>
    body,html {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      height: 100vh;
      width: 100vw;
    }

    .error {
      visibility: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
      width: 100%;
      flex-direction: column;
      gap: 15px;
    }

    .button {
      background-color: rgb(9, 10, 47);
      border-radius: 5px;
      color: white;
      padding: 5px 10px;
      text-decoration: none;
    }

    .button:focus,
    .button:hover {
      background-color: rgb(13, 14, 65);
      color: white;
    }
  </style>
</head>
<body>
  <div id="error" class="error">
    This is a Test App. Please run react in local to connect.
    <br/>
    <a id="retry" class="button" href="#">Retry</a>
  </div>
</body>
<script>
const app = () => {

  const setIntervalX = (callback, delay, repetitions) => {
    let x = 0;
    const intervalID = window.setInterval(function () {
      callback();
      x += 1;
      if (x === repetitions) {
        window.clearInterval(intervalID);
      }
    }, delay);
  };

  const redirect = (url) => {
    window.location.href = url;
  };
  const load = () => {
    fetch('http://localhost:10001/route-to-app?name=sticky-notes&version=1.0.0&apptype=app&filename=ticketSidebar.html', { follow: 'redirect' })
    .then((data) => {
      if (data.status >= 400) {
        return Promise.reject(data);
      } else if (data.redirected) {
        return redirect(data.url);
      }
      return undefined;
    })
    .catch(() => document.getElementById('error').style.visibility = "visible");
  };
  document.getElementById('retry').addEventListener('click', () => {
    document.getElementById('error').style.visibility = "hidden";
    setIntervalX(load, 3000, 10);
  });
  load();
  setIntervalX(load, 3000, 10);
};
app();

</script>
</html>
